<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Acadêmico</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <section class="container py-5">

    <div class="card shadow border-0 rounded-5">
      <div class="card-body p-5">

        <div class="text-center mb-5">
          <h1 class="fw-bold">Registro de Estudante</h1>
          <p class="text-muted">
            Insira as informações abaixo para cadastrar um novo aluno na plataforma.
          </p>
        </div>

        <form class="row g-4">

          <!-- Nome -->
          <div class="col-lg-6">
            <label class="form-label fw-semibold">Nome do Aluno</label>
            <input type="text" class="form-control rounded-3" placeholder="Digite o nome completo">
          </div>

          <!-- CPF -->
          <div class="col-lg-6">
            <label class="form-label fw-semibold">CPF</label>
            <input type="text" class="form-control rounded-3" placeholder="000.000.000-00">
          </div>

          <!-- Nascimento -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Nascimento</label>
            <input type="date" class="form-control rounded-3">
          </div>

          <!-- Telefone -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Celular</label>
            <input type="tel" class="form-control rounded-3" placeholder="(00) 00000-0000">
          </div>

          <!-- Email -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="email" class="form-control rounded-3" placeholder="aluno@email.com">
          </div>

          <!-- Endereço -->
          <div class="col-12">
            <label class="form-label fw-semibold">Endereço</label>
            <input type="text" class="form-control rounded-3" placeholder="Rua, número, bairro">
          </div>

          <!-- Cidade -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Cidade</label>
            <input type="text" class="form-control rounded-3">
          </div>

          <!-- Estado -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">UF</label>
            <select class="form-select rounded-3">
              <option selected disabled>Selecione</option>
              <option>SC</option>
              <option>PR</option>
              <option>SP</option>
              <option>RS</option>
            </select>
          </div>

          <!-- CEP -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">CEP</label>
            <input type="text" class="form-control rounded-3" placeholder="00000-000">
          </div>

          <!-- Curso -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Curso</label>
            <input type="text" class="form-control rounded-3" placeholder="Nome do curso">
          </div>

          <!-- Matrícula -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Número de Matrícula</label>
            <input type="text" class="form-control rounded-3">
          </div>

          <!-- Senha -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Criar Senha</label>
            <input type="password" class="form-control rounded-3">
          </div>

          <!-- Confirmar -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Confirmar Senha</label>
            <input type="password" class="form-control rounded-3">
          </div>

          <!-- Botão -->
          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success w-100 py-3 rounded-4 fw-bold">
              Finalizar Cadastro
            </button>
          </div>

        </form>

      </div>
    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
